model:
  name: transformer_full_pilot_1epoch
  architecture: transformer
  input_dim: 6
  d_model: 64
  nhead: 4
  num_layers: 2
  dim_feedforward: 128
  dropout: 0.1
  pred_len: 30

training:
  batch_size: 32
  epochs: 1
  learning_rate: 0.0005
  weight_decay: 0.0001
  loss: smooth_l1
  gradient_clip: 1.0
  early_stopping_patience: 1
  seed: 42
  device: cuda
  num_workers: 0
  out_dir: D:/runs/vehicle_trajectory_project/full_pilot_1epoch
