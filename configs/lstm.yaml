model:
  name: lstm
  architecture: lstm
  input_dim: 6
  hidden_dim: 128
  num_layers: 2
  dropout: 0.1
  pred_len: 30

training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: smooth_l1
  gradient_clip: 1.0
  early_stopping_patience: 7
  seed: 42
  device: cpu
  num_workers: 0
  out_dir: outputs
