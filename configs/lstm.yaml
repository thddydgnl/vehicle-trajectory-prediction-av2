model:
  name: lstm_smoke
  architecture: tiny_regressor
  hidden_dim: 64
  pred_len: 30

training:
  batch_size: 64
  epochs: 2
  learning_rate: 0.001
  weight_decay: 0.0001
  loss: smooth_l1
  gradient_clip: 1.0
  early_stopping_patience: 2
  seed: 42
  device: cpu
  num_workers: 0
  out_dir: outputs
