model:
  name: diffusion_direct_full_pilot_1epoch
  architecture: diffusion_direct
  input_dim: 6
  pred_len: 30
  trajectory_dim: 60
  cond_dim: 64
  hidden_dim: 96
  diffusion_steps: 10
  sampling_steps: 5
  beta_start: 0.0001
  beta_end: 0.02
  num_samples: 4

training:
  batch_size: 64
  epochs: 1
  learning_rate: 0.0005
  weight_decay: 0.0001
  loss: noise_mse
  gradient_clip: 1.0
  early_stopping_patience: 1
  seed: 42
  device: cuda
  num_workers: 0
  out_dir: D:/runs/vehicle_trajectory_project/full_pilot_1epoch
