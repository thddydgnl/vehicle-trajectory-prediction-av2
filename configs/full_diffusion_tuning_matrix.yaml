run:
  tuning_dir: D:/runs/vehicle_trajectory_project/full_long_tuning
  final_dir: D:/runs/vehicle_trajectory_project/full_long_final
  train_data: D:/data/vehicle_trajectory_project/processed/full/train_full.npz
  val_data: D:/data/vehicle_trajectory_project/processed/full/val_full.npz
  data_split: val_full
  target_type: av2_focal_mixed
  final_epochs: 30
  final_early_stopping_patience: 10
  require_target_gate_for_final: true

baselines:
  linear:
    ADE: 1.5324182510375977
    FDE: 3.7973430156707764
  diffusion_pca_f4:
    ADE: 6.277219772338867
    FDE: 12.322331428527832
    minADE: 6.096756935119629
    minFDE: 11.606433868408203
  diffusion_direct_f4:
    ADE: 10.058550834655762
    FDE: 19.448150634765625
    minADE: 9.881662368774414
    minFDE: 18.506914138793945

gates:
  min_epochs_ran: 5
  min_sample_diversity: 0.001
  preferred_min_metric_improvement_pct: 10.0

target_gates:
  diffusion_pca:
    max_minADE: 4.8
    max_minFDE: 9.5
  diffusion_direct:
    max_minADE: 8.0
    max_minFDE: 15.0

