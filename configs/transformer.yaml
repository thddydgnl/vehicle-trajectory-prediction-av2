model:
  name: transformer
  architecture: transformer
  input_dim: 6
  d_model: 128
  nhead: 4
  num_layers: 3
  dim_feedforward: 256
  dropout: 0.1
  pred_len: 30

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0003
  weight_decay: 0.0001
  loss: smooth_l1
  gradient_clip: 1.0
  early_stopping_patience: 10
  seed: 42
  device: cpu
  num_workers: 0
  out_dir: outputs
