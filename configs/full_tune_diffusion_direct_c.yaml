model:
  name: diffusion_direct_tune_c
  architecture: diffusion_direct
  input_dim: 6
  pred_len: 30
  trajectory_dim: 60
  cond_dim: 64
  hidden_dim: 128
  diffusion_steps: 100
  sampling_steps: 20
  beta_start: 0.0001
  beta_end: 0.02
  num_samples: 8

training:
  batch_size: 32
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.0001
  loss: noise_mse
  gradient_clip: 1.0
  early_stopping_patience: 6
  seed: 42
  device: cuda
  num_workers: 0
  out_dir: D:/runs/vehicle_trajectory_project/full_long_tuning
